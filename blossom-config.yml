# Blossom server configuration
# See https://github.com/hzrd149/blossom-server for full options

publicDomain: https://blossom.tubestr.app

storage:
  backend: local
  rules:
    - type: "*"
      expiration: 0

upload:
  enabled: true
  requireAuth: true

media:
  enabled: true

dashboard:
  enabled: true
  password: ${BLOSSOM_ADMIN_PASSWORD}
